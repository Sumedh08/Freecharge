server.port=${PORT:9876}

# Default Profile (In-memory H2 for fast Render startup)
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:h2:mem:tradingdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT (Use environment variable in production)
jwt.secret.key=${JWT_SECRET_KEY:wpembytrwcvnryxksdbqwjebruyHyudqgwveytrtrSnwifoesarjbwe}

# Eureka Client (disabled by default for local dev)
eureka.client.enabled=false
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka

# Redis (optional for local)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka (optional for local)
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=trading-group
spring.kafka.consumer.auto-offset-reset=earliest

# Actuator Endpoints for Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Mail (disabled for now)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Groq Open Source LLM API
groq.api.key=${GROQ_API_KEY}