# Docker Profile - PostgreSQL, Redis, Kafka enabled
spring.config.activate.on-profile=docker

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://postgres:5432/tradingdb
spring.datasource.username=trading
spring.datasource.password=trading123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Redis Cache
spring.data.redis.host=redis
spring.data.redis.port=6379

# Kafka
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=trading-group
spring.kafka.consumer.auto-offset-reset=earliest

# Eureka Service Discovery
eureka.client.enabled=true
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka
eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
