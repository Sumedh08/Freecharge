spring.application.name=api-gateway
server.port=8080

# Eureka Client
eureka.client.serviceUrl.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# Gateway Routes
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Route to Trading Service
spring.cloud.gateway.routes[0].id=trading-service
spring.cloud.gateway.routes[0].uri=lb://trading-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/(?<segment>.*), /api/${segment}

# Route for Auth
spring.cloud.gateway.routes[1].id=auth-route
spring.cloud.gateway.routes[1].uri=lb://trading-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/auth/**

# Route for Stocks
spring.cloud.gateway.routes[2].id=stocks-route
spring.cloud.gateway.routes[2].uri=lb://trading-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/stocks/**

# Static content (frontend)
spring.cloud.gateway.routes[3].id=frontend
spring.cloud.gateway.routes[3].uri=lb://trading-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/**

# Rate Limiting (using Redis)
spring.cloud.gateway.default-filters[0]=RequestRateLimiter=1,2,#{@userKeyResolver}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.tradingService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.tradingService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.tradingService.waitDurationInOpenState=30000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus,gateway
management.endpoint.gateway.enabled=true
